services:
  # DATABASE: Porta 5433 per evitare conflitti con il sistema host
  db:
    image: postgres:16
    container_name: fluxhr-db
    environment:
      POSTGRES_DB: fluxhr
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d fluxhr"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fluxhr-network

  # CACHE & BROKER
  redis:
    image: redis:7-alpine
    container_name: fluxhr-redis
    networks:
      - fluxhr-network

  # MAIL TESTER
  mailhog:
    image: mailhog/mailhog
    container_name: fluxhr-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - fluxhr-network

  # BACKEND API
  backend:
    build: ./backend
    container_name: fluxhr-backend
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    environment:
      - DATABASE_URL=postgresql://admin:password@db:5432/fluxhr
      - REDIS_URL=redis://redis:6379/0
      - SMTP_SERVER=mailhog
      - SMTP_PORT=1025
      - IMAP_SERVER=mailhog
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - fluxhr-network

  # CELERY WORKER
  worker:
    build: ./backend
    container_name: fluxhr-worker
    command: celery -A app.worker.celery_app worker --beat --loglevel=info
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    environment:
      - DATABASE_URL=postgresql://admin:password@db:5432/fluxhr
      - REDIS_URL=redis://redis:6379/0
      - SMTP_SERVER=mailhog
      - SMTP_PORT=1025
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - fluxhr-network

  # FRONTEND REACT
  frontend:
    build: ./frontend
    container_name: fluxhr-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=0 
    depends_on:
      - backend
    networks:
      - fluxhr-network

networks:
  fluxhr-network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data: